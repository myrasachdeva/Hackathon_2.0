<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAZARUS | THE_ALLEY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --bg-deep: #020208;
            --electric-blue: #00d2ff;
            --machine-indigo: #0a0a20;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-deep);
            font-family: 'VT323', monospace;
            height: 100vh;
        }

        /* 1. THE ROOM (Old Arcade Vibe) */
        .floor {
            position: absolute;
            bottom: -15vh;
            width: 200vw; height: 80vh; left: -50vw;
            background-image: 
                linear-gradient(to right, #08081a 1px, transparent 1px),
                linear-gradient(to bottom, #08081a 1px, transparent 1px);
            background-size: 100px 100px;
            transform: perspective(800px) rotateX(70deg);
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
            z-index: 1;
        }

        /* 2. THE STRIPED TITLE (From your image) */
        .logo-area {
            position: absolute;
            top: 5vh;
            width: 100%;
            text-align: center;
            z-index: 20;
        }

        .logo {
            font-size: 100px;
            letter-spacing: 12px;
            margin: 0;
            background: linear-gradient(to bottom, 
                #fff 50%, 
                rgba(255,255,255,0.7) 50%
            );
            background-size: 100% 6px; /* The 'scanned' stripes */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--electric-blue));
            text-transform: uppercase;
        }

        /* 3. THE OLD CABINET DESIGN (Angular & Heavy) */
        .arcade-row {
            position: absolute;
            bottom: 8vh;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 80px;
            perspective: 2000px;
            z-index: 10;
        }

        .machine-wrap {
            position: relative;
            transform-style: preserve-3d;
            transition: 0.5s cubic-bezier(0.1, 0.7, 0.1, 1);
            -webkit-box-reflect: below -20px linear-gradient(transparent 60%, rgba(0, 210, 255, 0.1));
        }

        /* The Old-School Cabinet Shell */
        .machine {
            width: 220px;
            height: 400px;
            background: linear-gradient(165deg, #050510 0%, var(--machine-indigo) 100%);
            border: 2px solid #1a1a40;
            border-top: 4px solid var(--electric-blue);
            display: flex;
            flex-direction: column;
            /* The 'Old Arcade' Silhouette */
            clip-path: polygon(0 0, 100% 0, 100% 75%, 85% 100%, 15% 100%, 0 75%);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
        }

        .screen {
            width: 180px;
            height: 140px;
            background: #000;
            margin: 35px auto 10px;
            border: 1px solid #0a0a25;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--electric-blue);
            text-shadow: 0 0 10px var(--electric-blue);
            box-shadow: inset 0 0 30px #080824;
            /* Global glow animation */
            animation: syncGlow 4s ease-in-out infinite;
        }

        /* 4. SYNCED GLOW (All 3 together) */
        @keyframes syncGlow {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 5px var(--electric-blue)); }
            50% { filter: brightness(1.3) drop-shadow(0 0 20px var(--electric-blue)); }
        }

        /* 5. INTERACTION */
        .play-btn {
            margin: auto auto 65px;
            background: transparent;
            border: 1px solid var(--electric-blue);
            color: var(--electric-blue);
            padding: 8px 30px;
            cursor: pointer;
            font-family: 'VT323', monospace;
            font-size: 20px;
            letter-spacing: 2px;
            transition: 0.3s;
            background: rgba(0, 210, 255, 0.05);
        }

        .play-btn:hover {
            background: var(--electric-blue);
            color: var(--bg-deep);
            box-shadow: 0 0 30px var(--electric-blue);
        }

        /* Perspective Tilt for the Row */
        .machine-wrap:nth-child(1) { transform: rotateY(20deg); }
        .machine-wrap:nth-child(3) { transform: rotateY(-20deg); }

        .machine-wrap:hover {
            transform: translateY(-20px) rotateY(0deg) scale(1.05);
            z-index: 20;
        }

    </style>
</head>
<body>

    <div class="floor"></div>

    <div class="logo-area">
        <h1 class="logo">LAZARUS</h1>
        <div style="font-size: 14px; opacity: 0.4; letter-spacing: 10px; color: #fff;">STATION_04_REBOOT</div>
    </div>

    <div class="arcade-row">
        <div class="machine-wrap">
            <div class="machine">
                <div class="screen">FLAPPY.EXE</div>
                <button class="play-btn">INITIATE</button>
            </div>
        </div>

        <div class="machine-wrap">
            <div class="machine" style="border-top-color: #fff;">
                <div class="screen" style="color: #fff; text-shadow: 0 0 10px #fff;">DINO_RUN.sys</div>
                <button class="play-btn" style="border-color: #fff; color: #fff;">INITIATE</button>
            </div>
        </div>

        <div class="machine-wrap">
            <div class="machine">
                <div class="screen">HANGMAN.BAT</div>
                <button class="play-btn">INITIATE</button>
            </div>
        </div>
    </div>

</body>
</html>
