<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BioBloom</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Nunito', sans-serif;
      }

      #game-container {
        position: relative;
        width: 100%;
        height: 100vh;
      }

      canvas {
        position: absolute;
        top: 0; left: 0;
        width: 100% !important;
        height: 100% !important;
        z-index: 0;
      }

      #ui-layer {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 24px 0 18px;
        pointer-events: all;
        z-index: 10;
      }

      /* ── Floating butterflies ── */
      .butterfly {
        position: absolute;
        font-size: 22px;
        animation: flutter linear infinite;
        pointer-events: none;
        z-index: 5;
      }
      @keyframes flutter {
        0%   { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0; }
        10%  { opacity: 1; }
        50%  { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(1.1); }
        90%  { opacity: 1; }
        100% { transform: translate(var(--dx2), var(--dy2)) rotate(var(--rot2)) scale(0.9); opacity: 0; }
      }

      /* ── Floating petals ── */
      .petal {
        position: absolute;
        width: 10px; height: 14px;
        border-radius: 50% 0 50% 0;
        animation: petalFall linear infinite;
        pointer-events: none;
        z-index: 4;
        opacity: 0.75;
      }
      @keyframes petalFall {
        0%   { transform: translate(0, -20px) rotate(0deg); opacity: 0; }
        10%  { opacity: 0.75; }
        100% { transform: translate(var(--px), 110vh) rotate(var(--pr)); opacity: 0; }
      }

      /* ── Wind shimmer on grass ── */
      @keyframes grassWave {
        0%, 100% { transform: skewX(0deg) scaleY(1); }
        50%       { transform: skewX(4deg) scaleY(1.04); }
      }

      .title-card {
        background: rgba(241, 248, 233, 0.88);
        border: 2px solid #A5D6A7;
        border-radius: 18px;
        padding: 16px 48px 12px;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        backdrop-filter: blur(4px);
      }
      .title-card h1 {
        font-size: 46px;
        font-weight: 800;
        color: #2E7D32;
        line-height: 1.1;
        letter-spacing: -0.5px;
        text-shadow: 0 2px 8px rgba(46,125,50,0.15);
      }
      .title-card p {
        font-size: 16px;
        color: #558B2F;
        font-style: italic;
        margin-top: 4px;
      }

      .spacer { flex: 1; }

      .grade-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .grade-label {
        font-size: 19px;
        font-weight: 700;
        color: #33691E;
        font-style: italic;
        text-shadow: 0 1px 4px rgba(255,255,255,0.6);
      }

      .grade-row {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: center;
      }

      .grade-btn {
        width: 115px;
        height: 60px;
        border-radius: 14px;
        border: 2.5px solid;
        font-family: 'Nunito', sans-serif;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        box-shadow: 0 4px 0px rgba(0,0,0,0.13);
        backdrop-filter: blur(2px);
      }
      .grade-btn:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 0px rgba(0,0,0,0.12);
      }
      .grade-btn:active {
        transform: translateY(0px);
        box-shadow: 0 2px 0px rgba(0,0,0,0.10);
      }

      .btn-1 { background: rgba(200,230,201,0.9); border-color: #81C784; color: #1B5E20; }
      .btn-2 { background: rgba(165,214,167,0.9); border-color: #66BB6A; color: #1B5E20; }
      .btn-3 { background: rgba(129,199,132,0.9); border-color: #4CAF50; color: #1B5E20; }
      .btn-4 { background: rgba(102,187,106,0.9); border-color: #388E3C; color: #fff; }
      .btn-5 { background: rgba(76,175,80,0.9);   border-color: #2E7D32; color: #fff; }

      .footer {
        font-size: 13px;
        color: #33691E;
        font-style: italic;
        background: rgba(255,255,255,0.5);
        padding: 4px 16px;
        border-radius: 20px;
        backdrop-filter: blur(2px);
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="ui-layer">

        <div class="title-card">
          <h1>🌸 BioBloom</h1>
          <p>Can you bring it back to life?</p>
        </div>

        <div class="spacer"></div>

        <div class="grade-section">
          <div class="grade-label">— Select Your Grade —</div>
          <div class="grade-row">
            <button class="grade-btn btn-1" onclick="startGame(1)">Grade 1</button>
            <button class="grade-btn btn-2" onclick="startGame(2)">Grade 2</button>
            <button class="grade-btn btn-3" onclick="startGame(3)">Grade 3</button>
            <button class="grade-btn btn-4" onclick="startGame(4)">Grade 4</button>
            <button class="grade-btn btn-5" onclick="startGame(5)">Grade 5</button>
          </div>
        </div>

        <div class="footer">🌿 Spell the answer letter by letter to revive the flower</div>

      </div>

      <!-- Floating butterflies injected by JS -->
      <!-- Floating petals injected by JS -->
    </div>

    <script>
      function startGame(grade) {
        document.getElementById('ui-layer').style.display = 'none';
        window._startGrade = grade;
        window._gradeSelected = true;
      }

      // ── Inject floating butterflies ──────────────────────────────────────
      const butterflies = ['🦋','🐝','🌼','🌸'];
      for (let i = 0; i < 7; i++) {
        const el = document.createElement('div');
        el.className = 'butterfly';
        el.textContent = butterflies[i % butterflies.length];
        const startX = Math.random() * 90;
        const startY = Math.random() * 70 + 10;
        const dx  = (Math.random() - 0.5) * 200;
        const dy  = (Math.random() - 0.5) * 120;
        const dx2 = dx + (Math.random() - 0.5) * 150;
        const dy2 = dy + (Math.random() - 0.5) * 100;
        const rot  = (Math.random() - 0.5) * 40;
        const rot2 = (Math.random() - 0.5) * 60;
        el.style.cssText = `
          left: ${startX}vw; top: ${startY}vh;
          --dx: ${dx}px; --dy: ${dy}px;
          --dx2: ${dx2}px; --dy2: ${dy2}px;
          --rot: ${rot}deg; --rot2: ${rot2}deg;
          animation-duration: ${5 + Math.random() * 7}s;
          animation-delay: ${Math.random() * 6}s;
        `;
        document.getElementById('game-container').appendChild(el);
      }

      // ── Inject falling petals ─────────────────────────────────────────────
      const petalColors = ['#F48FB1','#FFD54F','#CE93D8','#EF9A9A','#FFCC80','#80CBC4'];
      for (let i = 0; i < 14; i++) {
        const el = document.createElement('div');
        el.className = 'petal';
        el.style.cssText = `
          left: ${Math.random() * 100}vw;
          top: ${Math.random() * -20}vh;
          background: ${petalColors[i % petalColors.length]};
          --px: ${(Math.random() - 0.5) * 160}px;
          --pr: ${Math.random() * 720 - 360}deg;
          animation-duration: ${6 + Math.random() * 8}s;
          animation-delay: ${Math.random() * 10}s;
          width: ${8 + Math.random() * 8}px;
          height: ${10 + Math.random() * 8}px;
        `;
        document.getElementById('game-container').appendChild(el);
      }
    </script>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
